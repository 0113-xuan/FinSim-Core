<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FutureWallet 模擬平台</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-cloud cloud-1"></div>
  <div class="bg-cloud cloud-2"></div>
  <div class="bg-ground-dirt"></div>
  <div class="bg-ground-grass"></div>

  <div class="container">
    
    <div id="main-logo" class="w-full flex justify-center mt-6 mb-6 shrink-0">
      <div class="relative inline-flex justify-center">
        <img src="logo.png" alt="AI Bank Wallet" class="floating-logo w-auto max-w-full max-h-[15vh] md:max-h-[20vh] object-contain px-4">
        <div id="splash-text" class="splash-text">Financial Future!</div>
      </div>
    </div>

    <div id="page-register" class="mc-panel variant-stone max-w-md mx-auto mb-12 flex flex-col gap-4 hidden relative-panel w-full shrink-0">
      <div class="panel-badge badge-stone">Register</div>
      <h2 class="text-center text-lg font-bold drop-shadow-black text-white mb-2">建立新帳號</h2>
      <div class="flex flex-col gap-1"><label class="text-white text-xs text-shadow-sm">帳號 (Username)</label><input type="text" id="reg-account" class="mc-input-pixel"></div>
      <div class="flex flex-col gap-1"><label class="text-white text-xs text-shadow-sm">電子郵件 (Email)</label><input type="email" id="reg-email" class="mc-input-pixel"></div>
      <div class="flex flex-col gap-1"><label class="text-white text-xs text-shadow-sm">密碼 (Password)</label><input type="password" id="reg-password" class="mc-input-pixel"></div>
      <div class="mt-2 flex flex-col gap-3">
        <button id="btn-submit-register" class="btn-pixel bg-yellow text-black font-bold w-full">確認註冊</button>
        <button id="btn-back-to-login" class="btn-pixel bg-gray text-black font-bold w-full">返回登入</button>
      </div>
    </div>

    <div id="page-login" class="mc-panel variant-stone max-w-md mx-auto mb-12 flex flex-col gap-4 relative-panel w-full shrink-0">
      <div class="panel-badge badge-stone">Login</div>
      <h2 class="text-center text-lg font-bold drop-shadow-black text-white mb-2">登入</h2>
      <div class="flex flex-col gap-1"><label class="text-white text-xs text-shadow-sm">帳號 (Username)</label><input type="text" id="login-account" class="mc-input-pixel"></div>
      <div class="flex flex-col gap-1"><label class="text-white text-xs text-shadow-sm">電子郵件 (Email)</label><input type="email" id="login-email" class="mc-input-pixel"></div>
      <div class="flex flex-col gap-1"><label class="text-white text-xs text-shadow-sm">密碼 (Password)</label><input type="password" id="login-password" class="mc-input-pixel"></div>
      <div class="mt-2 flex flex-col gap-3">
        <button id="btn-login" class="btn-pixel bg-green text-black font-bold w-full">登入 (Login)</button>
        <button id="btn-register" class="btn-pixel variant-obsidian text-white font-bold w-full">註冊新帳號</button>
      </div>
    </div>

    <div id="page-setup-1" class="mc-panel variant-dirt max-w-md mx-auto mb-12 flex flex-col gap-4 hidden relative-panel w-full shrink-0">
      <div class="panel-badge badge-dirt">Setup 1/2</div>
      <h2 class="text-center text-lg font-bold text-white mb-2" style="text-shadow: 2px 2px 0 #000;">初始財務設定</h2>
      <div class="flex flex-col gap-1"><label class="text-white text-xs text-shadow-sm">目前資產總額 ($)</label><input type="number" id="setup-balance" class="mc-input"></div>
      <div class="flex flex-col gap-1"><label class="text-white text-xs text-shadow-sm">每月固定收入 ($)</label><input type="number" id="setup-income" class="mc-input"></div>
      <div class="mt-2 flex flex-col gap-3">
        <button id="btn-next-to-expenses" class="btn-pixel bg-yellow text-black font-bold w-full">下一步 ➡</button>
        <button id="btn-back-to-login-from-setup" class="btn-pixel bg-gray text-black font-bold w-full">⬅ 返回登入</button>
      </div>
    </div>

    <div id="page-setup-2" class="mc-panel variant-dirt max-w-md mx-auto mb-12 flex flex-col gap-4 hidden relative-panel w-full shrink-0">
      <div class="panel-badge badge-dirt">Setup 2/2</div>
      <h2 class="text-center text-lg font-bold text-white mb-2" style="text-shadow: 2px 2px 0 #000;">支出估算</h2>
      <div class="flex flex-col gap-1"><label class="text-white text-xs text-shadow-sm">每月固定支出 ($)</label><input type="number" id="setup-fixed-expenses" class="mc-input"></div>
      <div class="flex flex-col gap-1"><label class="text-white text-xs text-shadow-sm">每月變動支出預估 ($)</label><input type="number" id="setup-var-expenses" class="mc-input"></div>
      <div class="mt-2 flex flex-col gap-3">
        <button id="btn-start-sim" class="btn-pixel bg-green text-black font-bold w-full">啟動 60 個月模擬 🚀</button>
        <button id="btn-back-to-setup-1" class="btn-pixel bg-gray text-black font-bold w-full">⬅ 返回修改</button>
      </div>
    </div>

    <div id="page-dashboard" class="hidden flex-col flex-1 pb-4 mt-4">
      <main class="grid-layout">
        <div class="col-left">
          <section id="panel-default" class="mc-panel variant-stone relative-panel">
            <div class="panel-badge badge-stone text-xs">60-Month Projection</div>
            <div class="chart-container"><canvas id="financeChart"></canvas></div>
          </section>

          <section class="mc-panel variant-obsidian relative-panel chat-section flex-col">
            <div class="panel-badge badge-obsidian text-xs">💡 AI Synchronizer</div>
            <div id="ai-insights" class="chat-messages">
              <div class="text-center text-gray-400 text-xs my-2">-- System Online --</div>
              <div class="message-ai flex items-start gap-2">
                <div class="text-xl">🧙‍♂️</div>
                <div class="msg-bubble bg-gray-800 border-2 border-gray-600 p-3 text-white text-xs">
                  我是 AI 顧問。我已同步你的初始資料，接下來你每一筆記帳，我都會在此即時結算！
                </div>
              </div>
            </div>
          </section>
        </div>

        <div class="col-right">
          <section class="mc-panel variant-stone relative-panel flex-col">
            <div class="panel-badge badge-stone text-xs">Accounting</div>
            <div id="accounting-form" class="flex flex-col gap-4 mt-2 flex-1">
              <div class="flex flex-col gap-1"><label class="text-xs font-bold">金額 (Amount)</label><input type="number" id="record-amount" class="mc-input-pixel" placeholder="支出請加負號"></div>
              <div class="flex flex-col gap-1"><label class="text-xs font-bold">備註 (Note)</label><input type="text" id="record-note" class="mc-input-pixel" placeholder="例如: 購買物品"></div>
              <div class="flex flex-col gap-1"><label class="text-xs font-bold">日期 (Date)</label><input type="date" id="record-date" class="mc-input-pixel"></div>
              
              <div class="flex flex-col gap-3 mt-auto">
                <button id="btn-submit-record" class="btn-pixel bg-green text-black font-bold w-full">➕ 新增紀錄</button>
                <button id="btn-view-history" class="btn-pixel bg-gray text-black font-bold w-full">📜 歷史紀錄</button>
              </div>
            </div>
            
            <div id="history-panel" class="hidden flex-col h-full mt-2">
              <button id="btn-back-to-form" class="btn-pixel bg-gray text-black font-bold mb-4 w-full">⬅ 返回</button>
              <div id="history-list" class="flex flex-col gap-2 overflow-y-auto flex-1"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script>
    // ==========================================
    // 🌟 全局變數與元件抓取
    // ==========================================
    const pageRegister = document.getElementById('page-register'); 
    const pageLogin = document.getElementById('page-login');
    const pageSetup1 = document.getElementById('page-setup-1'); 
    const pageSetup2 = document.getElementById('page-setup-2'); 
    const pageDashboard = document.getElementById('page-dashboard');
    const mainLogo = document.getElementById('main-logo'); 
    const API_BASE = window.location.origin;
    let currentUser = JSON.parse(sessionStorage.getItem('currentUser') || 'null');
    let currentBalance = 0; 
    let monthlyNetFlow = 0; 

    async function apiRequest(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, options);
      const data = await response.json();
      if (!response.ok) {
        const detail = typeof data.detail === 'object' ? JSON.stringify(data.detail, null, 2) : data.detail;
        throw new Error(detail || `${path} 請求失敗`);
      }
      return data;
    }

    function renderApiError(prefix, error) {
      alert(`${prefix}\n${error.message || '請稍後再試'}`);
    }

    // ==========================================
    // 🌟 Minecraft 黃色標語輪替邏輯
    // ==========================================
    const splashTextEl = document.getElementById('splash-text');
    const splashMessages = ["Machine Learning!", "Artificial Intelligence!", "Shout out to Minecraft!"];
    let splashIndex = Math.floor(Math.random() * splashMessages.length);
    splashTextEl.textContent = splashMessages[splashIndex];
    setInterval(() => {
      splashIndex = (splashIndex + 1) % splashMessages.length;
      splashTextEl.textContent = splashMessages[splashIndex];
    }, 3000);

    // ==========================================
    // 🌟 頁面導覽邏輯 (返回上頁/下一步)
    // ==========================================
    document.getElementById('btn-register').addEventListener('click', () => { pageLogin.classList.add('hidden'); pageRegister.classList.remove('hidden'); });
    document.getElementById('btn-back-to-login').addEventListener('click', () => { pageRegister.classList.add('hidden'); pageLogin.classList.remove('hidden'); });

    document.getElementById('btn-next-to-expenses').addEventListener('click', () => {
      if(!document.getElementById('setup-balance').value || !document.getElementById('setup-income').value) {
        alert("請先輸入您的資產與收入！"); return;
      }
      pageSetup1.classList.add('hidden');
      pageSetup2.classList.remove('hidden');
    });

    document.getElementById('btn-back-to-login-from-setup').addEventListener('click', () => {
      pageSetup1.classList.add('hidden');
      pageLogin.classList.remove('hidden');
    });

    document.getElementById('btn-back-to-setup-1').addEventListener('click', () => {
      pageSetup2.classList.add('hidden');
      pageSetup1.classList.remove('hidden');
    });

    // ==========================================
    // 🌟 正式連線版：流程 1 註冊 API (/auth/register)
    // ==========================================
    document.getElementById('btn-submit-register').addEventListener('click', async () => {
      const acc = document.getElementById('reg-account').value;
      const email = document.getElementById('reg-email').value; 
      const pass = document.getElementById('reg-password').value;
      const registerBtn = document.getElementById('btn-submit-register'); 

      if(!acc || !email || !pass) { 
        alert("⚠️ 請完整輸入想註冊的帳號、電子郵件與密碼！"); 
        return; 
      }
      
      const originalBtnText = registerBtn.textContent;
      registerBtn.textContent = "資料庫寫入中..."; 
      registerBtn.disabled = true;

      try {
        const data = await apiRequest('/auth/register', { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: acc, email: email, password: pass })
        });

        alert(data.message || "✅ 註冊成功！請在登入畫面輸入剛剛的資料。");
        document.getElementById('reg-account').value = '';
        document.getElementById('reg-email').value = ''; 
        document.getElementById('reg-password').value = '';
        pageRegister.classList.add('hidden'); 
        pageLogin.classList.remove('hidden'); 
      } catch (error) {
        renderApiError("❌ 註冊失敗：", error);
      } finally {
        registerBtn.textContent = originalBtnText; 
        registerBtn.disabled = false;
      }
    });

    // ==========================================
    // 🌟 正式連線版：流程 2 登入 API (/auth/login)
    // ==========================================
    document.getElementById('btn-login').addEventListener('click', async () => {
      const acc = document.getElementById('login-account').value;
      const email = document.getElementById('login-email').value; 
      const pass = document.getElementById('login-password').value;
      const loginBtn = document.getElementById('btn-login');

      if (!acc || !email || !pass) { 
        alert("⚠️ 請完整填寫帳號、電子郵件與密碼！\n(如果還沒註冊，請點擊下方的『註冊新帳號』)"); 
        return; 
      }

      const originalBtnText = loginBtn.textContent;
      loginBtn.textContent = "資料庫驗證中..."; 
      loginBtn.disabled = true;

      try {
        const formData = new URLSearchParams();
        formData.append('username', acc);
        formData.append('email', email); 
        formData.append('password', pass);

        const data = await apiRequest('/auth/login', {
          method: 'POST', 
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData 
        });

        currentUser = data.user || null;
        if (currentUser) {
          sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
        }
        alert(data.message || "✅ 登入成功！");
        pageLogin.classList.add('hidden');
        pageSetup1.classList.remove('hidden'); 
      } catch (error) {
        renderApiError("❌ 登入失敗：", error);
      } finally {
        loginBtn.textContent = originalBtnText; 
        loginBtn.disabled = false;
      }
    });

    // ==========================================
    // 🌟 正式連線版：流程 3 開始模擬 API (/simulate)
    // ==========================================
    document.getElementById('btn-start-sim').addEventListener('click', async () => {
      const initBalance = Number(document.getElementById('setup-balance').value);
      const initIncome = Number(document.getElementById('setup-income').value);
      const initFixedExp = Number(document.getElementById('setup-fixed-expenses').value);
      const initVarExp = Number(document.getElementById('setup-var-expenses').value);
      const startBtn = document.getElementById('btn-start-sim');

      if(isNaN(initBalance) || isNaN(initIncome) || isNaN(initFixedExp) || isNaN(initVarExp)) { 
        alert("請完整輸入所有欄位數值才能進行模擬喔！"); 
        return; 
      }

      startBtn.textContent = "AI 運算 60 個月數據中... ⏳"; 
      startBtn.disabled = true;

      try {
        if (!currentUser || !currentUser.id) {
          throw new Error("請先登入，系統才能把財務資料綁定到你的帳號。");
        }

        await apiRequest('/financial-profile/create', {
          user_id: currentUser.id,
          current_savings: initBalance,
          monthly_income: initIncome,
          has_loan: false,
          loan_amount: 0
        });

        const payload = {
          profile: {
            salary: initIncome,
            fixed_expense: initFixedExp,
            variable_expense: initVarExp,
            balance: initBalance
          },
          months: 60,
          events: [],
          loans: [],
          user_id: currentUser.id
        };

        const data = await apiRequest('/simulate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        console.log("【後端 AI 模擬結果】:", data);
          
        currentBalance = initBalance;
        monthlyNetFlow = initIncome - initFixedExp - initVarExp;

        const labelsArray = ['今日'];
        const dataArray = [currentBalance];
        let simBalance = currentBalance;

        for (let i = 1; i <= 60; i++) {
          simBalance += monthlyNetFlow; 
          if (i % 6 === 0) labelsArray.push(`第${i}個月`);
          else labelsArray.push('');
          dataArray.push(simBalance);
        }

        financeChart.data.labels = labelsArray;
        financeChart.data.datasets[0].data = dataArray;
        financeChart.update();

        // 隱藏設定面板，顯示主控台
        pageSetup2.classList.add('hidden');
        mainLogo.classList.add('hidden'); 
        pageDashboard.classList.remove('hidden');
        if (typeof financeChart !== 'undefined') financeChart.resize();
      } catch (error) {
        console.error("連線錯誤:", error);
        renderApiError("❌ 模擬或財務資料儲存失敗：", error);
      } finally {
        startBtn.textContent = "啟動 60 個月模擬 🚀"; 
        startBtn.disabled = false;
      }
    });

    // ==========================================
    // 🌟 記帳系統切換邏輯
    // ==========================================
    const accountingForm = document.getElementById('accounting-form');
    const historyPanel = document.getElementById('history-panel');
    
    document.getElementById('btn-view-history').addEventListener('click', () => { 
      accountingForm.classList.add('hidden'); 
      historyPanel.classList.remove('hidden'); 
    });

    document.getElementById('btn-back-to-form').addEventListener('click', () => { 
      historyPanel.classList.add('hidden'); 
      accountingForm.classList.remove('hidden'); 
    });

    // ==========================================
    // 🌟 記帳系統 ＆ AI 財務狀況即時播報
    // ==========================================
    const historyList = document.getElementById('history-list');
    const aiInsights = document.getElementById('ai-insights'); 
    
    document.getElementById('btn-submit-record').addEventListener('click', async () => {
      const amount = document.getElementById('record-amount').value;
      const note = document.getElementById('record-note').value;
      const date = document.getElementById('record-date').value;

      if (!amount || !note || !date) { 
        alert("⚠️ 請完整填寫金額、備註與日期！"); 
        return; 
      }

      const numAmount = Number(amount);
      const isIncome = numAmount >= 0;
      const colorClass = isIncome ? 'text-green' : 'text-red';
      const sign = isIncome ? '+ ' : '- ';
      const displayAmount = Math.abs(numAmount).toLocaleString(); 

      try {
        if (!currentUser || !currentUser.id) {
          throw new Error("請先登入，系統才能把記帳資料綁定到你的帳號。");
        }

        await apiRequest('/event/add', {
          user_id: currentUser.id,
          event_type: note,
          amount: numAmount
        });
      } catch (error) {
        renderApiError("❌ 記帳紀錄沒有寫入後端：", error);
        return;
      }

      currentBalance += numAmount; 

      financeChart.data.datasets[0].data = financeChart.data.datasets[0].data.map((value, index) => (
        index === 0 ? currentBalance : value + numAmount
      ));
      financeChart.update();

      const recordHTML = `
        <div class="mc-panel variant-obsidian p-2 text-xs border-2 mb-2">
          <div class="text-gray text-xs">${date}</div>
          <div class="flex justify-between mt-1">
            <span>${note}</span>
            <span class="${colorClass}">${sign}$ ${displayAmount}</span>
          </div>
        </div>
      `;
      historyList.insertAdjacentHTML('afterbegin', recordHTML);

      const insightText = isIncome
        ? `💰 收到一筆收入：+ $${displayAmount} (${note})\n\n📊 【最新財務狀態更新】\n目前總資產：$${currentBalance.toLocaleString()}\n請繼續保持良好的資金流動！`
        : `💸 記下一筆支出：- $${displayAmount} (${note})\n\n📊 【最新財務狀態更新】\n目前總資產降至：$${currentBalance.toLocaleString()}\n(提醒：每月預估淨結餘為 ${monthlyNetFlow > 0 ? '+ $' + monthlyNetFlow.toLocaleString() : '- $' + Math.abs(monthlyNetFlow).toLocaleString()}，請確保現金水位安全。)`;

      const insightHTML = `
        <div class="message-ai flex items-start gap-2 mt-4">
          <div class="text-xl">🧙‍♂️</div>
          <div class="msg-bubble bg-gray-800 border-2 border-blue-500 p-3 text-white text-xs">
            ${insightText}
          </div>
        </div>
      `;
      aiInsights.insertAdjacentHTML('beforeend', insightHTML);
      aiInsights.scrollTop = aiInsights.scrollHeight; 

      document.getElementById('record-amount').value = '';
      document.getElementById('record-note').value = '';
      document.getElementById('record-date').value = '';
    });

    // ==========================================
    // 🌟 Chart.js 動態財務圖表初始化
    // ==========================================
    const ctx = document.getElementById('financeChart').getContext('2d');
    const financeChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [], 
        datasets: [{
          label: '總資產變化 (60個月預測)',
          data: [], 
          borderColor: '#5c9e31', 
          backgroundColor: 'rgba(92, 158, 49, 0.2)',
          borderWidth: 3,
          stepped: true, 
          pointBackgroundColor: '#85db49',
          pointBorderColor: '#111',
          pointRadius: 4,
          pointHoverRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { left: 45, right: 20, top: 10 } },
        plugins: { legend: { labels: { color: 'white', font: { family: "'DotGothic16', sans-serif", size: 14 } } } },
        scales: {
          y: { ticks: { color: '#9ca3af', font: { family: "'Press Start 2P', cursive", size: 10 } }, grid: { color: '#333' } },
          x: { ticks: { color: '#9ca3af', font: { family: "'DotGothic16', sans-serif", size: 12 }, maxRotation: 45, minRotation: 45 }, grid: { color: '#333' } }
        }
      }
    });

  </script>
</body>
</html>
