<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FutureWallet 模擬平台</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --mc-sky: #87CEEB;
      --mc-dirt-bg: #86592d;
      --mc-grass-bg: #5c9e31;
      --mc-stone-bg: #c6c6c6;
      --mc-stone-border-light: #ffffff;
      --mc-stone-border-dark: #555555;
      --mc-dirt-border-light: #c69c6d;
      --mc-dirt-border-dark: #4d3319;
      --mc-obsidian-bg: #1e1e1e;
      --mc-obsidian-border-light: #4a4a4a;
      --mc-obsidian-border-dark: #111111;
      --text-green: #5c9e31;
      --text-red: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--mc-sky);
      font-family: 'Press Start 2P', 'DotGothic16', sans-serif;
      color: #000;
      line-height: 1.5;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* 背景裝飾 */
    .bg-cloud { position: absolute; background-color: rgba(255, 255, 255, 0.8); border: 4px solid rgba(255, 255, 255, 0.9); box-shadow: 4px 4px 0 rgba(0,0,0,0.1); }
    .cloud-1 { top: 40px; left: 10%; width: 128px; height: 64px; }
    .cloud-2 { top: 96px; right: 20%; width: 192px; height: 80px; }
    .bg-ground-dirt { position: absolute; bottom: 0; left: 0; right: 0; height: 35vh; background-color: var(--mc-dirt-bg); z-index: 0; }
    .bg-ground-grass { position: absolute; bottom: 35vh; left: 0; right: 0; height: 16px; background-color: var(--mc-grass-bg); z-index: 0; }

    .container { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; min-height: 100vh; }

    /* Minecraft 面板與按鈕 */
    .mc-panel { border: 4px solid; padding: 16px; }
    .variant-stone { background-color: var(--mc-stone-bg); border-top-color: var(--mc-stone-border-light); border-left-color: var(--mc-stone-border-light); border-bottom-color: var(--mc-stone-border-dark); border-right-color: var(--mc-stone-border-dark); }
    .variant-dirt { background-color: var(--mc-dirt-bg); border-top-color: var(--mc-dirt-border-light); border-left-color: var(--mc-dirt-border-light); border-bottom-color: var(--mc-dirt-border-dark); border-right-color: var(--mc-dirt-border-dark); }
    .variant-obsidian { background-color: var(--mc-obsidian-bg); border-top-color: var(--mc-obsidian-border-light); border-left-color: var(--mc-obsidian-border-light); border-bottom-color: var(--mc-obsidian-border-dark); border-right-color: var(--mc-obsidian-border-dark); color: white; }
    .variant-glass { background-color: rgba(255, 255, 255, 0.2); border: none; box-shadow: inset 4px 4px 0 rgba(255, 255, 255, 0.3); }

    .relative-panel { position: relative; }
    .panel-badge { position: absolute; top: -28px; left: 16px; border: 4px solid; border-bottom: none; padding: 4px 12px; font-size: 12px; z-index: 10; }
    .badge-dirt { background-color: var(--mc-dirt-bg); border-color: var(--mc-dirt-border-light) var(--mc-dirt-border-dark) transparent var(--mc-dirt-border-light); color: white; text-shadow: 2px 2px 0 #000; }
    .badge-stone { background-color: var(--mc-stone-bg); border-color: var(--mc-stone-border-light) var(--mc-stone-border-dark) transparent var(--mc-stone-border-light); color: black; }
    .badge-obsidian { background-color: #2b2b2b; border-color: var(--mc-obsidian-border-light) var(--mc-obsidian-border-dark) transparent var(--mc-obsidian-border-light); color: white; text-shadow: 2px 2px 0 #000; }

    /* 像素風 UI (強制覆蓋) */
    .btn-pixel { border: 4px solid #000; padding: 12px 16px; font-family: inherit; cursor: pointer; text-align: center; border-radius: 0; box-shadow: 4px 4px 0px 0px #000; transition: transform 0.1s, box-shadow 0.1s; }
    .btn-pixel:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #000; }
    .mc-input-pixel { background-color: #fff; border: 4px solid #000; color: #000; padding: 12px; font-family: inherit; font-size: 14px; outline: none; width: 100%; border-radius: 0; box-shadow: inset 3px 3px 0px rgba(0,0,0,0.1); }
    .mc-input-pixel:focus { border-color: #3b82f6; }
    .mc-input { background-color: rgba(0, 0, 0, 0.6); border: 2px solid #555555; color: white; padding: 10px; font-family: inherit; font-size: 14px; outline: none; box-shadow: inset 3px 3px 0 rgba(0, 0, 0, 0.8); width: 100%; }
    .mc-input:focus { border-color: #85db49; }
    .bg-yellow { background-color: #fde047 !important; }
    .bg-gray { background-color: #9ca3af !important; }
    .bg-green { background-color: #4ade80 !important; }

    /* HUD 與小工具 */
    .hud-panel { margin-bottom: 24px; }
    .hud-content { display: flex; flex-wrap: wrap; align-items: center; gap: 24px; color: white; text-shadow: 2px 2px 0 #000; }
    .hud-item { display: flex; align-items: center; gap: 8px; }
    .hud-text { display: flex; flex-direction: column; }
    .hud-label { font-size: 10px; color: #e5e7eb; margin-bottom: 4px; }
    .hud-value { font-size: 16px; }
    .credit-score { margin-left: auto; align-items: flex-end; flex-direction: column;}
    .hearts { display: flex; gap: 4px; }
    .icon-heart { width: 16px; height: 16px; fill: #ef4444; }
    .icon-shield { width: 16px; height: 16px; fill: #facc15; margin-left: 4px; }
    .icon { width: 24px; height: 24px; }
    .text-green { color: var(--text-green); }
    .text-red { color: var(--text-red); }
    .drop-shadow-black { text-shadow: 2px 2px 0 #000; }
    .text-shadow-sm { text-shadow: 1px 1px 0 #000; }

    /* 網格排版 (左 7 : 右 5) */
    .grid-layout { display: grid; grid-template-columns: 7fr 5fr; gap: 24px; flex: 1; align-items: stretch; padding-bottom: 16px; }
    @media (max-width: 1024px) { .grid-layout { grid-template-columns: 1fr; } .credit-score { margin-left: 0; align-items: flex-start; } }
    .col-left { display: flex; flex-direction: column; gap: 24px; height: 100%; }
    .col-right { height: 100%; }

    /* 圖表與對話框 */
    #panel-default { flex: 6; display: flex; flex-direction: column; margin-top: 0 !important; }
    .chart-container { width: 100%; flex: 1; min-height: 200px; position: relative; background-color: var(--mc-obsidian-bg); border: 4px solid; border-color: #111 #444 #444 #111; box-shadow: inset 4px 4px 0 rgba(0,0,0,0.5); padding: 16px 16px 16px 4px; }
    .chat-section { flex: 4; display: flex; flex-direction: column; margin-top: 0 !important; height: auto; }
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 8px; }
    .msg-bubble { border-radius: 0; box-shadow: 3px 3px 0 rgba(0,0,0,0.6); line-height: 1.6; max-width: 85%; }
    .message-player { flex-direction: row-reverse; }
    .message-player .msg-bubble { background-color: #2563eb; border-color: #1e3a8a; }
    .chat-messages::-webkit-scrollbar { width: 12px; }
    .chat-messages::-webkit-scrollbar-track { background: #1e1e1e; border-left: 2px solid #000; }
    .chat-messages::-webkit-scrollbar-thumb { background: #555; border: 2px solid #000; box-shadow: inset 2px 2px 0 rgba(255,255,255,0.2); }
    .chat-messages::-webkit-scrollbar-thumb:hover { background: #777; }
    .chat-input-area { display: flex; gap: 8px; border-top: 1px solid #444; padding-top: 12px; }
    
    /* 記帳系統右側 */
    .col-right > section { margin-top: 0 !important; height: 100%; display: flex; flex-direction: column; }

    /* ==========================================
       🌟 視覺特效動畫 (Logo 與標語) 🌟
       ========================================== */
    .floating-logo {
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 15px 10px rgba(0,0,0,0.6));
    }
    @keyframes float {
      0% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-10px) scale(1.02); }
      100% { transform: translateY(0px) scale(1); }
    }

    .splash-text {
      position: absolute;
      right: 25%; 
      bottom: 10%; 
      color: #ffff00; 
      font-family: 'DotGothic16', 'Press Start 2P', sans-serif;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 2px 2px 0 #3f3f00; 
      transform: rotate(-20deg);
      animation: splash-pulse 0.4s alternate infinite ease-in-out;
      z-index: 50; 
      pointer-events: none; 
      white-space: nowrap; 
    }
    @keyframes splash-pulse {
      from { transform: rotate(-20deg) scale(1); }
      to   { transform: rotate(-20deg) scale(1.15); }
    }
  </style>
</head>
<body>
  <div class="bg-cloud cloud-1"></div>
  <div class="bg-cloud cloud-2"></div>
  <div class="bg-ground-dirt"></div>
  <div class="bg-ground-grass"></div>

  <div class="container">
    
    <div id="main-logo" class="w-full flex justify-center mt-10 mb-4 relative">
      <img src="logo.png" alt="AI Bank Wallet" class="floating-logo w-auto max-w-full sm:max-w-xl md:max-w-2xl px-4">
      <div id="splash-text" class="splash-text">Machine Learning!</div>
    </div>

    <div id="page-register" class="mc-panel variant-stone max-w-md mx-auto mt-4 p-8 flex-col gap-4 hidden relative-panel">
      <div class="panel-badge badge-stone">Register</div>
      <h2 class="text-center text-xl font-bold mb-4 drop-shadow-black text-white">建立新帳號</h2>
      <label class="text-white text-sm text-shadow-sm">帳號 (Username)</label>
      <input type="text" id="reg-account" class="mc-input-pixel mb-4" placeholder="輸入想使用的帳號">
      <label class="text-white text-sm text-shadow-sm">密碼 (Password)</label>
      <input type="password" id="reg-password" class="mc-input-pixel mb-6" placeholder="輸入密碼">
      <button id="btn-submit-register" class="btn-pixel bg-yellow text-black w-full font-bold">確認註冊</button>
      <button id="btn-back-to-login" class="btn-pixel bg-gray text-black w-full mt-4 font-bold">返回登入</button>
    </div>

    <div id="page-login" class="mc-panel variant-stone max-w-md mx-auto mt-4 p-8 flex-col gap-4 relative-panel">
      <div class="panel-badge badge-stone">Login</div>
      <h2 class="text-center text-xl font-bold mb-4 drop-shadow-black text-white">登入</h2>
      <input type="text" id="login-account" class="mc-input-pixel mb-4" placeholder="輸入帳號">
      <input type="password" id="login-password" class="mc-input-pixel mb-6" placeholder="輸入密碼">
      <button id="btn-login" class="btn-pixel bg-green text-black w-full font-bold">登入 (Login)</button>
      <button id="btn-register" class="btn-pixel variant-obsidian text-white w-full mt-4 font-bold">註冊新帳號</button>
    </div>

    <div id="page-setup" class="mc-panel variant-dirt max-w-md mx-auto mt-4 p-8 flex-col gap-4 hidden relative-panel">
      <div class="panel-badge badge-dirt">Setup</div>
      <h2 class="text-center text-xl font-bold mb-4 text-white drop-shadow-black">設定初始財務狀況</h2>
      <p class="text-sm text-gray-200 mb-4">請輸入您的真實資料以進行準確的 AI 模擬：</p>
      <label class="text-white text-sm text-shadow-sm">目前資產總額 ($)</label>
      <input type="number" id="setup-balance" class="mc-input mb-4" placeholder="例如: 1250000">
      <label class="text-white text-sm text-shadow-sm">每月固定收入 ($)</label>
      <input type="number" id="setup-income" class="mc-input mb-6" placeholder="例如: 45000">
      <button id="btn-start-sim" class="btn-pixel bg-yellow text-black w-full font-bold">開始財務模擬 🚀</button>
    </div>

    <div id="page-dashboard" class="hidden flex-col h-full">
      
      <header class="mc-panel variant-glass hud-panel">
        <div class="hud-content">
          <div class="hud-item">
            <svg class="icon text-green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <div class="hud-text"><span class="hud-label">資產總額 (Balance)</span><span id="total-balance" class="hud-value text-green">$ 0</span></div>
          </div>
          <div class="hud-item">
            <svg class="icon text-green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
            <div class="hud-text"><span class="hud-label">月收入 (Income)</span><span id="monthly-income" class="hud-value text-green">+ 0</span></div>
          </div>
          <div class="hud-item credit-score">
            <span class="hud-label">信用評分 (Credit)</span>
            <div class="hearts">
              <svg class="icon-heart" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
              <svg class="icon-heart" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
              <svg class="icon-heart" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
              <svg class="icon-heart" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
              <svg class="icon-shield" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
          </div>
        </div>
      </header>

      <main class="grid-layout">
        <div class="col-left">
          <section id="panel-default" class="mc-panel variant-stone relative-panel">
            <div class="panel-badge badge-stone">財務圖表 (Finance)</div>
            <div class="chart-container"><canvas id="financeChart"></canvas></div>
          </section>

          <section class="mc-panel variant-obsidian relative-panel chat-section flex-col">
            <div class="panel-badge badge-obsidian">💬 AI 顧問 (Advisor)</div>
            <div id="chat-messages" class="chat-messages">
              <div class="text-center text-gray-400 text-xs my-2">-- 模擬已啟動，您的專屬 AI 顧問已上線 --</div>
              <div class="message-ai flex items-start gap-2">
                <div class="text-2xl drop-shadow-black">🧙‍♂️</div>
                <div class="msg-bubble bg-gray-800 border-2 border-gray-600 p-2 text-white text-sm">
                  您好！我是您的財務顧問。根據您的初始設定，資金已就位。請在右側輸入您的收支，或隨時向我詢問財務建議！
                </div>
              </div>
            </div>
            <div class="chat-input-area mt-3 flex gap-2">
              <input type="text" id="chat-input" class="mc-input-pixel flex-1" placeholder="按 Enter 傳送訊息...">
              <button id="btn-send-chat" class="btn-pixel bg-yellow text-black font-bold">送出</button>
            </div>
          </section>
        </div>

        <div class="col-right">
          <section class="mc-panel variant-stone relative-panel h-full flex-col">
            <div class="panel-badge badge-stone">記帳系統 (Accounting)</div>
            
            <div id="accounting-form" class="flex-col gap-4 mt-4 h-full">
              <div class="form-group flex-col">
                <label class="text-white text-sm mb-1 text-shadow-sm">金額 (Amount)</label>
                <input type="number" id="record-amount" class="mc-input" placeholder="例如: 500 (支出請加負號)">
              </div>
              <div class="form-group flex-col mt-4">
                <label class="text-white text-sm mb-1 text-shadow-sm">備註 (Note)</label>
                <input type="text" id="record-note" class="mc-input" placeholder="例如: 購買鐵十字鎬">
              </div>
              <div class="form-group flex-col mt-4">
                <label class="text-white text-sm mb-1 text-shadow-sm">日期 (Date)</label>
                <input type="date" id="record-date" class="mc-input">
              </div>
              <div class="flex-col gap-2 mt-auto pt-6">
                <button id="btn-submit-record" class="btn-pixel bg-green text-black w-full font-bold">➕ 新增紀錄</button>
                <button id="btn-view-history" class="btn-pixel bg-gray text-black w-full mt-2 font-bold">📜 查看歷史紀錄</button>
              </div>
            </div>

            <div id="history-panel" class="hidden flex-col h-full mt-4">
              <button id="btn-back-to-form" class="btn-pixel bg-gray text-black mb-4 w-full font-bold">⬅ 返回記帳</button>
              <div id="history-list" class="flex-col gap-2 overflow-y-auto flex-1 text-white"></div>
            </div>
          </section>
        </div>
      </main>

    </div>
  </div>

  <script>
    // ==========================================
    // 🌟 全局變數與元件抓取
    // ==========================================
    const pageRegister = document.getElementById('page-register'); 
    const pageLogin = document.getElementById('page-login');
    const pageSetup = document.getElementById('page-setup');
    const pageDashboard = document.getElementById('page-dashboard');
    const mainLogo = document.getElementById('main-logo'); 
    let currentBalance = 0; 

    // ==========================================
    // 🌟 Minecraft 黃色標語輪替邏輯
    // ==========================================
    const splashTextEl = document.getElementById('splash-text');
    const splashMessages = [
      "Machine Learning!", 
      "Artificial Intelligence!", 
      "Shout out to Minecraft!"
    ];
    let splashIndex = Math.floor(Math.random() * splashMessages.length);
    splashTextEl.textContent = splashMessages[splashIndex];

    setInterval(() => {
      splashIndex = (splashIndex + 1) % splashMessages.length;
      splashTextEl.textContent = splashMessages[splashIndex];
    }, 3000);

    // ==========================================
    // 🌟 登入/註冊畫面純切換 (按下方按鈕切換畫面)
    // ==========================================
    document.getElementById('btn-register').addEventListener('click', () => {
      pageLogin.classList.add('hidden');
      pageRegister.classList.remove('hidden');
    });

    document.getElementById('btn-back-to-login').addEventListener('click', () => {
      pageRegister.classList.add('hidden');
      pageLogin.classList.remove('hidden');
    });

    // ==========================================
    // 🌟 流程 1：註冊 API 串接 (/user/create)
    // ==========================================
    document.getElementById('btn-submit-register').addEventListener('click', async () => {
      const acc = document.getElementById('reg-account').value;
      const pass = document.getElementById('reg-password').value;
      const registerBtn = document.getElementById('btn-submit-register'); 

      if(!acc || !pass) { 
        alert("⚠️ 請完整輸入想要註冊的帳號與密碼！"); 
        return; 
      }
      
      const originalBtnText = registerBtn.textContent;
      registerBtn.textContent = "資料庫寫入中..."; 
      registerBtn.disabled = true;

      try {
        const response = await fetch('https://finsim-core.onrender.com/auth/register', { 
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: acc, password: pass })
        });
        const data = await response.json();

        // 🎯 註冊成功：跳回登入介面，並清空輸入框
        if (response.ok && data.status === "success") {
          alert("✅ 註冊成功！請在登入畫面輸入剛剛的帳密。");
          document.getElementById('reg-account').value = '';
          document.getElementById('reg-password').value = '';
          pageRegister.classList.add('hidden'); // 隱藏註冊
          pageLogin.classList.remove('hidden'); // 跳回登入
        } else {
          // 註冊失敗 (例如：帳號已經被別人用過了)
          alert("❌ 註冊失敗：" + (data.detail || "帳號可能已存在"));
        }
      } catch (error) {
        alert("🚨 無法連線，請確認後端 Python 伺服器已啟動！");
      } finally {
        registerBtn.textContent = originalBtnText; 
        registerBtn.disabled = false;
      }
    });

// ==========================================
    // 🌟 流程 2：登入驗證 API 串接 (/user/login)
    // ==========================================
    document.getElementById('btn-login').addEventListener('click', async () => {
      const acc = document.getElementById('login-account').value;
      const pass = document.getElementById('login-password').value;
      const loginBtn = document.getElementById('btn-login');

      // 🎯 沒輸入資料就按登入：擋下來
      if (!acc || !pass) { 
        alert("⚠️ 請輸入帳號與密碼！\n(如果還沒註冊，請點擊下方的『註冊新帳號』)"); 
        return; 
      }

      const originalBtnText = loginBtn.textContent;
      loginBtn.textContent = "資料庫驗證中..."; 
      loginBtn.disabled = true;

      try {
        // 🚨 關鍵修改 1：把傳送格式從 JSON 改成 FastAPI 最愛的 Form Data 表單格式！
        const formData = new URLSearchParams();
        formData.append('username', acc);
        formData.append('password', pass);

        const response = await fetch('https://finsim-core.onrender.com/auth/login', {
          method: 'POST', 
          headers: { 
            // 注意這裡！改成表單的 Content-Type
            'Content-Type': 'application/x-www-form-urlencoded' 
          },
          body: formData // 送出表單
        });
        
        const data = await response.json();

        // 🎯 驗證成功：(FastAPI 登入成功有時會回傳 access_token，我們兩個都判斷比較保險)
        if (response.ok && (data.status === "success" || data.access_token)) {
          alert("✅ 登入成功！");
          pageLogin.classList.add('hidden');
          pageSetup.classList.remove('hidden'); // 進入設定初始資金畫面
        } else {
          // 🚨 關鍵修改 2：把後端傳來的物件「強制轉成文字」，破解 [object Object] 的真面目！
          let errorMsg = data.detail;
          if (typeof errorMsg === 'object') {
            errorMsg = JSON.stringify(errorMsg, null, 2);
          }
          alert("❌ 登入失敗：\n" + (errorMsg || "該帳號尚未註冊，或密碼輸入錯誤！"));
        }
      } catch (error) {
        alert("🚨 無法連線到資料庫，請確認後端已啟動！");
      } finally {
        loginBtn.textContent = originalBtnText; 
        loginBtn.disabled = false;
      }
    });

    // ==========================================
    // 🌟 流程 3：開始模擬 API 串接 (/simulate)
    // ==========================================
    document.getElementById('btn-start-sim').addEventListener('click', async () => {
      const initBalance = document.getElementById('setup-balance').value;
      const initIncome = document.getElementById('setup-income').value;
      const startBtn = document.getElementById('btn-start-sim');

      if(!initBalance || !initIncome) {
        alert("請輸入資產與收入才能進行模擬喔！");
        return;
      }

      const originalText = startBtn.textContent;
      startBtn.textContent = "AI 運算中... ⏳";
      startBtn.disabled = true;

      try {
        const payload = {
          profile: {
            salary: Number(initIncome),
            fixed_expense: 0,
            variable_expense: 0,
            current_balance: Number(initBalance)
          },
          months: 12,
          events: [],
          loans: []
        };

        const response = await fetch('https://finsim-core.onrender.com/simulate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          console.log("【後端 AI 模擬結果】:", data);
          
          currentBalance = Number(initBalance); 
          document.getElementById('total-balance').textContent = '$ ' + currentBalance.toLocaleString();
          document.getElementById('monthly-income').textContent = '+ ' + Number(initIncome).toLocaleString();

          financeChart.data.datasets[0].data = [currentBalance];
          financeChart.data.labels = ['初始'];
          financeChart.update();

          pageSetup.classList.add('hidden');
          mainLogo.classList.add('hidden'); 
          pageDashboard.classList.remove('hidden');
          
          if (typeof financeChart !== 'undefined') {
            financeChart.resize();
          }
        } else {
          alert("❌ 模擬失敗：" + (data.detail || "發生未知錯誤"));
        }
      } catch (error) {
        console.error("連線錯誤:", error);
        alert("🚨 無法連線到後端，請確認 FastAPI 伺服器已啟動！");
      } finally {
        startBtn.textContent = originalText;
        startBtn.disabled = false;
      }
    });

    // ==========================================
    // 🌟 記帳系統切換邏輯
    // ==========================================
    const accountingForm = document.getElementById('accounting-form');
    const historyPanel = document.getElementById('history-panel');
    
    document.getElementById('btn-view-history').addEventListener('click', () => {
      accountingForm.classList.add('hidden');
      historyPanel.classList.remove('hidden');
    });

    document.getElementById('btn-back-to-form').addEventListener('click', () => {
      historyPanel.classList.add('hidden');
      accountingForm.classList.remove('hidden');
    });

    // ==========================================
    // 🌟 記帳系統新增紀錄邏輯
    // ==========================================
    const historyList = document.getElementById('history-list');
    
    document.getElementById('btn-submit-record').addEventListener('click', () => {
      const amount = document.getElementById('record-amount').value;
      const note = document.getElementById('record-note').value;
      const date = document.getElementById('record-date').value;

      if (!amount || !note || !date) {
        alert("⚠️ 請完整填寫金額、備註與日期！");
        return;
      }

      const numAmount = Number(amount);
      const isIncome = numAmount >= 0;
      const colorClass = isIncome ? 'text-green' : 'text-red';
      const sign = isIncome ? '+ ' : '- ';
      const displayAmount = Math.abs(numAmount).toLocaleString(); 

      currentBalance += numAmount; 
      document.getElementById('total-balance').textContent = '$ ' + currentBalance.toLocaleString();

      const shortDate = date.substring(5); 
      financeChart.data.labels.push(shortDate);
      financeChart.data.datasets[0].data.push(currentBalance);
      financeChart.update();

      const recordHTML = `
        <div class="mc-panel variant-obsidian p-2 text-sm border-2">
          <div class="text-gray text-xs">${date}</div>
          <div class="flex justify-between mt-1">
            <span>${note}</span>
            <span class="${colorClass}">${sign}$ ${displayAmount}</span>
          </div>
        </div>
      `;
      historyList.insertAdjacentHTML('afterbegin', recordHTML);

      document.getElementById('record-amount').value = '';
      document.getElementById('record-note').value = '';
      document.getElementById('record-date').value = '';
      
      alert("✅ 紀錄新增成功！圖表與資產已同步更新！");
    });

    // ==========================================
    // 🌟 Chart.js 動態財務圖表初始化
    // ==========================================
    const ctx = document.getElementById('financeChart').getContext('2d');
    const financeChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [], 
        datasets: [{
          label: '總資產預測',
          data: [], 
          borderColor: '#5c9e31', 
          backgroundColor: 'rgba(92, 158, 49, 0.2)',
          borderWidth: 3,
          stepped: true, 
          pointBackgroundColor: '#85db49',
          pointBorderColor: '#111',
          pointRadius: 5,
          pointHoverRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { left: 45, right: 20 } },
        plugins: {
          legend: { labels: { color: 'white', font: { family: "'DotGothic16', sans-serif", size: 14 } } }
        },
        scales: {
          y: { ticks: { color: '#9ca3af', font: { family: "'Press Start 2P', cursive", size: 10 } }, grid: { color: '#333' } },
          x: { ticks: { color: '#9ca3af', font: { family: "'DotGothic16', sans-serif", size: 12 } }, grid: { color: '#333' } }
        }
      }
    });

    // ==========================================
    // 🌟 AI 對話框互動邏輯
    // ==========================================
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      const playerHtml = `
        <div class="message-player flex items-start gap-2">
          <div class="text-2xl drop-shadow-black">🧑‍🌾</div>
          <div class="msg-bubble bg-blue-600 border-2 border-blue-800 p-2 text-white text-sm">
            ${text}
          </div>
        </div>
      `;
      chatMessages.insertAdjacentHTML('beforeend', playerHtml);
      
      chatInput.value = '';
      chatMessages.scrollTop = chatMessages.scrollHeight;

      const typingId = 'typing-' + Date.now();
      const typingHtml = `
        <div id="${typingId}" class="message-ai flex items-start gap-2 opacity-70">
          <div class="text-2xl drop-shadow-black">🧙‍♂️</div>
          <div class="msg-bubble bg-gray-800 border-2 border-gray-600 p-2 text-gray-400 text-sm">
            魔法運算中... ⏳
          </div>
        </div>
      `;
      chatMessages.insertAdjacentHTML('beforeend', typingHtml);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // 未來可將此處替換為真正的 fetch('/ai/advice') 串接
      setTimeout(() => {
        document.getElementById(typingId).remove();
        const aiResponse = "這是個好問題！我目前正在等後端的 Python 系統連線上線。等組員把 API 寫好，我就能針對您的收支狀況給出神準的預測！";
        const aiHtml = `
          <div class="message-ai flex items-start gap-2">
            <div class="text-2xl drop-shadow-black">🧙‍♂️</div>
            <div class="msg-bubble bg-gray-800 border-2 border-gray-600 p-2 text-white text-sm">
              ${aiResponse}
            </div>
          </div>
        `;
        chatMessages.insertAdjacentHTML('beforeend', aiHtml);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 1500); 
    }

    document.getElementById('btn-send-chat').addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
