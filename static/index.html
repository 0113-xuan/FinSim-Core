<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FutureWallet 模擬平台</title>
  <link rel="stylesheet" href="style.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .btn-pixel {
      border: 4px solid #000;
      padding: 12px 16px;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      border-radius: 0; 
      box-shadow: 4px 4px 0px 0px #000; 
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-pixel:active {
      transform: translate(4px, 4px); 
      box-shadow: 0px 0px 0px 0px #000; 
    }
    .mc-input-pixel {
      background-color: #fff;
      border: 4px solid #000;
      color: #000;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      width: 100%;
      border-radius: 0;
      box-shadow: inset 3px 3px 0px rgba(0,0,0,0.1); 
    }
    .mc-input-pixel:focus {
      border-color: #3b82f6; 
    }
    .bg-yellow { background-color: #fde047 !important; }
    .bg-gray { background-color: #9ca3af !important; }
    .bg-green { background-color: #4ade80 !important; }

    /* 🌟 標題浮動動畫 🌟 */
    .floating-logo {
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 15px 10px rgba(0,0,0,0.6));
    }
    @keyframes float {
      0% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-10px) scale(1.02); }
      100% { transform: translateY(0px) scale(1); }
    }
  </style>
</head>
<body>
  <div class="bg-cloud cloud-1"></div>
  <div class="bg-cloud cloud-2"></div>
  <div class="bg-ground-dirt"></div>
  <div class="bg-ground-grass"></div>

  <div class="container">
    
    <div id="main-logo" class="w-full flex justify-center mt-10 mb-4">
      <img src="logo.png" alt="AI Bank Wallet" class="floating-logo w-auto max-w-full sm:max-w-xl md:max-w-2xl px-4">
    </div>

    <div id="page-register" class="mc-panel variant-stone max-w-md mx-auto mt-4 p-8 flex-col gap-4 hidden relative-panel">
      <div class="panel-badge badge-stone">Register</div>
      <h2 class="text-center text-xl font-bold mb-4 drop-shadow-black text-white">建立新帳號</h2>
      
      <label class="text-white text-sm text-shadow-sm">帳號 (Username)</label>
      <input type="text" id="reg-account" class="mc-input-pixel mb-4" placeholder="輸入想使用的帳號">
      
      <label class="text-white text-sm text-shadow-sm">密碼 (Password)</label>
      <input type="password" id="reg-password" class="mc-input-pixel mb-6" placeholder="輸入密碼">
      
      <button id="btn-submit-register" class="btn-pixel bg-yellow text-black w-full font-bold">確認註冊</button>
      <button id="btn-back-to-login" class="btn-pixel bg-gray text-black w-full mt-4 font-bold">返回登入</button>
    </div>

    <div id="page-login" class="mc-panel variant-stone max-w-md mx-auto mt-4 p-8 flex-col gap-4 relative-panel">
      <div class="panel-badge badge-stone">Login</div>
      <h2 class="text-center text-xl font-bold mb-4 drop-shadow-black text-white">登入</h2>
      
      <input type="text" id="login-account" class="mc-input-pixel mb-4" placeholder="輸入帳號">
      <input type="password" id="login-password" class="mc-input-pixel mb-6" placeholder="輸入密碼">
      
      <button id="btn-login" class="btn-pixel bg-green text-black w-full font-bold">登入 (Login)</button>
      <button id="btn-register" class="btn-pixel variant-obsidian text-white w-full mt-4 font-bold">註冊新帳號</button>
    </div>

    <div id="page-setup" class="mc-panel variant-dirt max-w-md mx-auto mt-4 p-8 flex-col gap-4 hidden relative-panel">
      <div class="panel-badge badge-dirt">Setup</div>
      <h2 class="text-center text-xl font-bold mb-4 text-white drop-shadow-black">設定初始財務狀況</h2>
      <p class="text-sm text-gray-200 mb-4">請輸入您的真實資料以進行準確的 AI 模擬：</p>
      
      <label class="text-white text-sm text-shadow-sm">目前資產總額 ($)</label>
      <input type="number" id="setup-balance" class="mc-input mb-4" placeholder="例如: 1250000">
      
      <label class="text-white text-sm text-shadow-sm">每月固定收入 ($)</label>
      <input type="number" id="setup-income" class="mc-input mb-6" placeholder="例如: 45000">
      
      <button id="btn-start-sim" class="btn-pixel bg-yellow text-black w-full font-bold">開始財務模擬 🚀</button>
    </div>

    <div id="page-dashboard" class="hidden flex-col h-full">
      
      <header class="mc-panel variant-glass hud-panel">
        <div class="hud-content">
          <div class="hud-item">
            <svg class="icon text-green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <div class="hud-text">
              <span class="hud-label">資產總額 (Balance)</span>
              <span id="total-balance" class="hud-value text-green">$ 0</span>
            </div>
          </div>
          <div class="hud-item">
            <svg class="icon text-green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
            <div class="hud-text">
              <span class="hud-label">月收入 (Income)</span>
              <span id="monthly-income" class="hud-value text-green">+ 0</span>
            </div>
          </div>
          <div class="hud-item credit-score">
            <span class="hud-label">信用評分 (Credit)</span>
            <div class="hearts">
              <svg class="icon-heart" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
              <svg class="icon-heart" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
              <svg class="icon-heart" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
              <svg class="icon-heart" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
              <svg class="icon-shield" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
          </div>
        </div>
      </header>

      <main class="grid-layout">
        
        <div class="col-left">

          <section id="panel-default" class="mc-panel variant-stone relative-panel">
            <div class="panel-badge badge-stone">財務圖表 (Finance)</div>
            <div class="chart-container">
              <canvas id="financeChart"></canvas>
            </div>
          </section>

          <section class="mc-panel variant-obsidian relative-panel chat-section flex-col">
            <div class="panel-badge badge-obsidian">💬 AI 顧問 (Advisor)</div>
            <div id="chat-messages" class="chat-messages">
              <div class="text-center text-gray-400 text-xs my-2">-- 模擬已啟動，您的專屬 AI 顧問已上線 --</div>
              <div class="message-ai flex items-start gap-2">
                <div class="text-2xl drop-shadow-black">🧙‍♂️</div>
                <div class="msg-bubble bg-gray-800 border-2 border-gray-600 p-2 text-white text-sm">
                  您好！我是您的財務顧問。根據您的初始設定，資金已就位。請在右側輸入您的收支，或隨時向我詢問財務建議！
                </div>
              </div>
            </div>
            <div class="chat-input-area mt-3 flex gap-2">
              <input type="text" id="chat-input" class="mc-input-pixel flex-1" placeholder="按 Enter 傳送訊息...">
              <button id="btn-send-chat" class="btn-pixel bg-yellow text-black font-bold">送出</button>
            </div>
          </section>

        </div>

        <div class="col-right">
          <section class="mc-panel variant-stone relative-panel h-full flex-col">
            <div class="panel-badge badge-stone">記帳系統 (Accounting)</div>
            
            <div id="accounting-form" class="flex-col gap-4 mt-4 h-full">
              <div class="form-group flex-col">
                <label class="text-white text-sm mb-1 text-shadow-sm">金額 (Amount)</label>
                <input type="number" id="record-amount" class="mc-input" placeholder="例如: 500 (支出請加負號)">
              </div>
              <div class="form-group flex-col mt-4">
                <label class="text-white text-sm mb-1 text-shadow-sm">備註 (Note)</label>
                <input type="text" id="record-note" class="mc-input" placeholder="例如: 購買鐵十字鎬">
              </div>
              <div class="form-group flex-col mt-4">
                <label class="text-white text-sm mb-1 text-shadow-sm">日期 (Date)</label>
                <input type="date" id="record-date" class="mc-input">
              </div>
              <div class="flex-col gap-2 mt-auto pt-6">
                <button id="btn-submit-record" class="btn-pixel bg-green text-black w-full font-bold">➕ 新增紀錄</button>
                <button id="btn-view-history" class="btn-pixel bg-gray text-black w-full mt-2 font-bold">📜 查看歷史紀錄</button>
              </div>
            </div>

            <div id="history-panel" class="hidden flex-col h-full mt-4">
              <button id="btn-back-to-form" class="btn-pixel bg-gray text-black mb-4 w-full font-bold">⬅ 返回記帳</button>
              <div id="history-list" class="flex-col gap-2 overflow-y-auto flex-1 text-white">
                </div>
            </div>

          </section>
        </div>

      </main>

    </div>
  </div>

  <script>
    // ==========================================
    // 1. 頁面切換控制與正式 API 串接
    // ==========================================
    const pageRegister = document.getElementById('page-register'); 
    const pageLogin = document.getElementById('page-login');
    const pageSetup = document.getElementById('page-setup');
    const pageDashboard = document.getElementById('page-dashboard');
    const mainLogo = document.getElementById('main-logo'); // 抓取標題 Logo

    let currentBalance = 0; 

    // --- 註冊與登入的切換 ---
    document.getElementById('btn-register').addEventListener('click', () => {
      pageLogin.classList.add('hidden');
      pageRegister.classList.remove('hidden');
    });

    document.getElementById('btn-back-to-login').addEventListener('click', () => {
      pageRegister.classList.add('hidden');
      pageLogin.classList.remove('hidden');
    });

    // 🌟 正式版：註冊 API 串接
    document.getElementById('btn-submit-register').addEventListener('click', async () => {
      const acc = document.getElementById('reg-account').value;
      const pass = document.getElementById('reg-password').value;
      const registerBtn = document.getElementById('btn-submit-register');

      if(!acc || !pass) {
        alert("⚠️ 請完整輸入帳號與密碼！");
        return;
      }

      const originalBtnText = registerBtn.textContent;
      registerBtn.textContent = "註冊中...";
      registerBtn.disabled = true;

      try {
        // 使用相對路徑連線
        const response = await fetch('/user/create', { 
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: acc, password: pass })
        });

        const data = await response.json();

        if (response.ok && data.status === "success") {
          alert("✅ 註冊成功！請使用新帳號登入。");
          document.getElementById('reg-account').value = '';
          document.getElementById('reg-password').value = '';
          pageRegister.classList.add('hidden');
          pageLogin.classList.remove('hidden');
        } else {
          alert("❌ 註冊失敗：" + JSON.stringify(data.detail || data));
        }
      } catch (error) {
        console.error("連線錯誤:", error);
        alert("🚨 無法連線到伺服器，請確認後端是否已啟動！");
      } finally {
        registerBtn.textContent = originalBtnText;
        registerBtn.disabled = false;
      }
    });

    // --- 登入 -> 設定 的切換 ---
    document.getElementById('btn-login').addEventListener('click', () => {
      pageLogin.classList.add('hidden');
      pageSetup.classList.remove('hidden');
    });

    // 🌟 正式版：開始模擬 API 串接 (/simulate)
    document.getElementById('btn-start-sim').addEventListener('click', async () => {
      const initBalance = document.getElementById('setup-balance').value;
      const initIncome = document.getElementById('setup-income').value;
      const startBtn = document.getElementById('btn-start-sim');

      if(!initBalance || !initIncome) {
        alert("請輸入資產與收入才能進行模擬喔！");
        return;
      }

      const originalText = startBtn.textContent;
      startBtn.textContent = "AI 運算中... ⏳";
      startBtn.disabled = true;

      try {
        const payload = {
          profile: {
            salary: Number(initIncome),
            fixed_expense: 0,
            variable_expense: 0,
            balance: Number(initBalance)
          },
          months: 12,
          events: [],
          loans: []
        };

        // 使用相對路徑連線
        const response = await fetch('/simulate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          console.log("【後端 AI 模擬結果】:", data);
          
          currentBalance = Number(initBalance); 
          document.getElementById('total-balance').textContent = '$ ' + currentBalance.toLocaleString();
          document.getElementById('monthly-income').textContent = '+ ' + Number(initIncome).toLocaleString();

          financeChart.data.datasets[0].data = [currentBalance];
          financeChart.data.labels = ['初始'];
          financeChart.update();

          pageSetup.classList.add('hidden');
          mainLogo.classList.add('hidden'); 
          pageDashboard.classList.remove('hidden');
          
          if (typeof financeChart !== 'undefined') {
            financeChart.resize();
          }
        } else {
          alert("❌ 模擬失敗：" + JSON.stringify(data.detail || data));
        }
      } catch (error) {
        console.error("連線錯誤:", error);
        alert("🚨 無法連線到後端，請確認 FastAPI 伺服器已啟動！");
      } finally {
        startBtn.textContent = originalText;
        startBtn.disabled = false;
      }
    });

    // ==========================================
    // 2. 記帳與歷史紀錄切換邏輯
    // ==========================================
    const accountingForm = document.getElementById('accounting-form');
    const historyPanel = document.getElementById('history-panel');
    const btnViewHistory = document.getElementById('btn-view-history');
    const btnBackToForm = document.getElementById('btn-back-to-form');
    
    btnViewHistory.addEventListener('click', () => {
      accountingForm.classList.add('hidden');
      historyPanel.classList.remove('hidden');
    });

    btnBackToForm.addEventListener('click', () => {
      historyPanel.classList.add('hidden');
      accountingForm.classList.remove('hidden');
    });

    // ==========================================
    // 3. 記帳收集與畫面渲染邏輯
    // ==========================================
    const btnSubmitRecord = document.getElementById('btn-submit-record');
    const historyList = document.getElementById('history-list');
    
    btnSubmitRecord.addEventListener('click', () => {
      const amount = document.getElementById('record-amount').value;
      const note = document.getElementById('record-note').value;
      const date = document.getElementById('record-date').value;

      if (!amount || !note || !date) {
        alert("⚠️ 請完整填寫金額、備註與日期！");
        return;
      }

      const numAmount = Number(amount);
      const isIncome = numAmount >= 0;
      const colorClass = isIncome ? 'text-green' : 'text-red';
      const sign = isIncome ? '+ ' : '- ';
      const displayAmount = Math.abs(numAmount).toLocaleString(); 

      currentBalance += numAmount; 
      document.getElementById('total-balance').textContent = '$ ' + currentBalance.toLocaleString();

      const shortDate = date.substring(5); 
      financeChart.data.labels.push(shortDate);
      financeChart.data.datasets[0].data.push(currentBalance);
      financeChart.update();

      const recordHTML = `
        <div class="mc-panel variant-obsidian p-2 text-sm border-2">
          <div class="text-gray text-xs">${date}</div>
          <div class="flex justify-between mt-1">
            <span>${note}</span>
            <span class="${colorClass}">${sign}$ ${displayAmount}</span>
          </div>
        </div>
      `;
      historyList.insertAdjacentHTML('afterbegin', recordHTML);

      document.getElementById('record-amount').value = '';
      document.getElementById('record-note').value = '';
      document.getElementById('record-date').value = '';
      
      alert("✅ 紀錄新增成功！圖表與資產已同步更新！");
    });

    // ==========================================
    // 4. 實作 Chart.js 動態財務圖表
    // ==========================================
    const ctx = document.getElementById('financeChart').getContext('2d');
    
    const financeChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [], 
        datasets: [{
          label: '總資產預測',
          data: [], 
          borderColor: '#5c9e31', 
          backgroundColor: 'rgba(92, 158, 49, 0.2)',
          borderWidth: 3,
          stepped: true, 
          pointBackgroundColor: '#85db49',
          pointBorderColor: '#111',
          pointRadius: 5,
          pointHoverRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { left: 45, right: 20 } },
        plugins: {
          legend: { 
            labels: { color: 'white', font: { family: "'DotGothic16', sans-serif", size: 14 } } 
          }
        },
        scales: {
          y: { ticks: { color: '#9ca3af', font: { family: "'Press Start 2P', cursive", size: 10 } }, grid: { color: '#333' } },
          x: { ticks: { color: '#9ca3af', font: { family: "'DotGothic16', sans-serif", size: 12 } }, grid: { color: '#333' } }
        }
      }
    });

    // ==========================================
    // 5. AI 對話框互動邏輯
    // ==========================================
    const chatInput = document.getElementById('chat-input');
    const btnSendChat = document.getElementById('btn-send-chat');
    const chatMessages = document.getElementById('chat-messages');

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      // 1. 顯示使用者的訊息
      const playerHtml = `
        <div class="message-player flex items-start gap-2">
          <div class="text-2xl drop-shadow-black">🧑‍🌾</div>
          <div class="msg-bubble bg-blue-600 border-2 border-blue-800 p-2 text-white text-sm">
            ${text}
          </div>
        </div>
      `;
      chatMessages.insertAdjacentHTML('beforeend', playerHtml);
      
      chatInput.value = '';
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // 2. 顯示 AI 正在思考的動畫
      const typingId = 'typing-' + Date.now();
      const typingHtml = `
        <div id="${typingId}" class="message-ai flex items-start gap-2 opacity-70">
          <div class="text-2xl drop-shadow-black">🧙‍♂️</div>
          <div class="msg-bubble bg-gray-800 border-2 border-gray-600 p-2 text-gray-400 text-sm">
            魔法運算中... ⏳
          </div>
        </div>
      `;
      chatMessages.insertAdjacentHTML('beforeend', typingHtml);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      try {
        // 3. 準備傳給後端的資料
        const initIncome = document.getElementById('setup-income').value || 0;

        const payload = {
          profile: {
             salary: Number(initIncome),
             fixed_expense: 0,
             variable_expense: 0,
             balance: currentBalance // 使用全域變數，這樣 AI 會知道最新餘額
          },
          options: [
            {
               name: "使用者提問",
               description: text,
               events: []
            }
          ],
          months: 12,
          mc_runs: 100
        };

        // 4. 呼叫後端 API
        const response = await fetch('/ai/advice', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        // 5. 移除「思考中」的動畫
        const typingElement = document.getElementById(typingId);
        if (typingElement) typingElement.remove();

        if (response.ok) {
           // 🌟 6. 解析後端回傳的 JSON 並美化排版
           let aiResponseText = "";
           
           if (typeof data === 'string') {
               aiResponseText = data; // 如果後端只傳字串，直接印出
           } 
           else if (data.summary || data.best_option) {
               // 將 JSON 資料轉化為有條理的 HTML 報告
               const riskLabel = data.risk_level === 'low' ? '🟢 低風險' : data.risk_level === 'medium' ? '🟡 中風險' : '🔴 高風險';
               const reasonsHtml = data.reason ? data.reason.map(r => `<li>${r}</li>`).join('') : '';
               const suggestionsHtml = data.suggestions ? data.suggestions.map(s => `<li>${s}</li>`).join('') : '';

               aiResponseText = `
                   <strong style="color:#fde047;">📊 顧問分析報告：</strong><br>
                   ${data.summary || "分析完成。"}<br><br>
                   
                   <strong style="color:#4ade80;">🏆 最佳建議方案：</strong><br>
                   ▶ 方案名稱：${data.best_option || "無"}<br>
                   ▶ 風險評估：${riskLabel}<br><br>
                   
                   <strong style="color:#60a5fa;">💡 詳細說明與建議：</strong><br>
                   <ul style="list-style-type: disc; margin-left: 20px;">
                       ${reasonsHtml}
                       ${suggestionsHtml}
                   </ul>
               `;
           }
           else {
               // 如果格式都不是上面兩種，就直接印出 JSON 字串
               aiResponseText = JSON.stringify(data);
           }
           
           const aiHtml = `
            <div class="message-ai flex items-start gap-2">
              <div class="text-2xl drop-shadow-black">🧙‍♂️</div>
              <div class="msg-bubble bg-gray-800 border-2 border-gray-600 p-2 text-white text-sm">
                ${aiResponseText}
              </div>
            </div>
          `;
          chatMessages.insertAdjacentHTML('beforeend', aiHtml);

        } else {
           // 處理後端報錯
           const errorHtml = `
            <div class="message-ai flex items-start gap-2">
              <div class="text-2xl drop-shadow-black">🧙‍♂️</div>
              <div class="msg-bubble bg-red-800 border-2 border-red-600 p-2 text-white text-sm">
                抱歉，我的魔法水晶球出錯了。(${JSON.stringify(data.detail || data)})
              </div>
            </div>
          `;
          chatMessages.insertAdjacentHTML('beforeend', errorHtml);
        }

      } catch (error) {
         console.error("對話連線錯誤:", error);
         
         const typingElement = document.getElementById(typingId);
         if (typingElement) typingElement.remove();
         
         const errorHtml = `
            <div class="message-ai flex items-start gap-2">
              <div class="text-2xl drop-shadow-black">🧙‍♂️</div>
              <div class="msg-bubble bg-red-800 border-2 border-red-600 p-2 text-white text-sm">
                連線失敗，請確認後端伺服器是否正常運作。
              </div>
            </div>
          `;
          chatMessages.insertAdjacentHTML('beforeend', errorHtml);
      } finally {
         chatMessages.scrollTop = chatMessages.scrollHeight;
      }
    }

    // 🌟 這裡補上了按鈕與鍵盤監聽事件 🌟
    btnSendChat.addEventListener('click', sendMessage);

    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

  </script>
</body>
</html>
